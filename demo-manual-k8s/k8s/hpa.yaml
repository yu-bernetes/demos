apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flask-demo-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flask-demo-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50 # If average CPU usage across pods is > 50%, add new pods.
